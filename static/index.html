<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Browser</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 0; padding: 24px; }
    .container { max-width: 1100px; margin: auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 16px 50px rgba(0,0,0,0.08); }
    h1 { margin-top: 0; }
    .controls { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 18px; align-items: center; }
    select, button, input { padding: 10px 12px; border: 1px solid #d4d4d4; border-radius: 8px; font-size: 15px; }
    button { cursor: pointer; background: #3b82f6; color: #fff; border-color: #3b82f6; }
    button:disabled { background: #9bbaf7; border-color: #9bbaf7; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; margin-top: 14px; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e8e8e8; }
    th { background: #f3f4f6; font-weight: 600; }
    .status { margin-top: 16px; color: #555; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Product Browser</h1>
    <div class="controls">
      <label>
        Category:
        <select id="category-select">
          <option value="">All categories</option>
        </select>
      </label>
      <label>
        Page size:
        <input id="page-size" type="number" value="25" min="1" max="100" />
      </label>
      <button id="load-button">Load products</button>
      <button id="next-button" disabled>Next page</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Created</th>
          <th>Updated</th>
        </tr>
      </thead>
      <tbody id="products-body"></tbody>
    </table>
    <div class="status" id="status">Ready.</div>
  </div>
  <script>
    const categorySelect = document.getElementById('category-select');
    const pageSizeInput = document.getElementById('page-size');
    const loadButton = document.getElementById('load-button');
    const nextButton = document.getElementById('next-button');
    const productsBody = document.getElementById('products-body');
    const statusDiv = document.getElementById('status');
    let nextCursor = null;
    let currentCategory = '';

    async function loadCategories() {
      const resp = await fetch('/categories');
      const categories = await resp.json();
      categories.forEach(category => {
        const option = document.createElement('option');
        option.value = category;
        option.textContent = category;
        categorySelect.appendChild(option);
      });
    }

    function renderProducts(items) {
      productsBody.innerHTML = '';
      items.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.id}</td>
          <td>${item.name}</td>
          <td>${item.category}</td>
          <td>$${item.price.toFixed(2)}</td>
          <td>${new Date(item.created_at).toLocaleString()}</td>
          <td>${new Date(item.updated_at).toLocaleString()}</td>
        `;
        productsBody.appendChild(row);
      });
    }

    async function loadProducts(useCursor = false) {
      const category = categorySelect.value;
      const pageSize = pageSizeInput.value;
      const params = new URLSearchParams();
      if (category) params.append('category', category);
      params.append('page_size', pageSize);
      if (useCursor && nextCursor) params.append('cursor', nextCursor);
      statusDiv.textContent = 'Loading...';
      const resp = await fetch('/products?' + params.toString());
      if (!resp.ok) {
        statusDiv.textContent = 'Failed to load products';
        return;
      }
      const data = await resp.json();
      renderProducts(data.items);
      nextCursor = data.next_cursor;
      nextButton.disabled = !nextCursor;
      currentCategory = category;
      statusDiv.textContent = `Showing ${data.items.length} products. Page size ${data.page_size}.`;
    }

    loadButton.addEventListener('click', () => {
      nextCursor = null;
      loadProducts(false);
    });

    nextButton.addEventListener('click', () => loadProducts(true));

    loadCategories().catch(() => { statusDiv.textContent = 'Could not load categories.'; });
  </script>
</body>
</html>
